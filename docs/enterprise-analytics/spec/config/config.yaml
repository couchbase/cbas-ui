openapi: 3.0.3
info:
  title: Enterprise Analytics Configuration REST API
  version: '2.1'
  description: |
    This API enables you to configure Enterprise Analytics Service.

servers:
  - url: '{scheme}://{host}:{port}'
    description: The URL scheme, host, and port are as follows.
    variables:
      scheme:
        default: http
        description: |-
          The URL scheme.
          Use `https` for secure access.
        enum:
          - http
          - https
      host:
        default: localhost
        description: The host name or IP address of a node.
      port:
        default: "8095"
        description: |-
          The Enterprise Analytics Service REST port.
          Use `18095` for secure access.
        enum:
          - "8095"
          - "18095"

paths:
  /api/v1/config/service:
    get:
      operationId: get_service
      summary: View Service-Level Parameters
      description: Views service-level parameters, which apply to all nodes.
      security:
        - AnalyticsManage: []
      responses:
        "200":
          description: >
            Success.
            Returns an object listing the configurable service-level parameters and their current values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        "401":
          $ref: '#/components/responses/Unauthorized'
    put:
      operationId: put_service
      summary: Modify Service-Level Parameters
      description: |-
        Modifies service-level parameters, which apply to all nodes.

        IMPORTANT: For the configuration changes to take effect,
        you must restart the Enterprise Analytics Service using the [Service Restart API][1].

        [1]: /enterprise-analytics/current/analytics-rest-admin/index.html#operation/restart_service
      requestBody:
        description: An object specifying one or more of the configurable service-level parameters.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Service"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/Service"
      security:
        - AnalyticsManage: []
      responses:
        "200":
          $ref: '#/components/responses/OK'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /api/v1/config/node:
    get:
      operationId: get_node
      summary: View Node-Specific Parameters
      description: Views node-specific parameters, which apply to the node receiving the request.
      security:
        - AnalyticsManage: []
      responses:
        "200":
          description: >
            Success.
            Returns an object listing the configurable node-level parameters and their current values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
        "401":
          $ref: '#/components/responses/Unauthorized'
    put:
      operationId: put_node
      summary: Modify Node-Specific Parameters
      description: |-
        Views node-specific parameters, which apply to the node receiving the request.

        IMPORTANT: For the configuration changes to take effect,
        you must restart the node using the [Node Restart API][1],
        or restart the Enterprise Analytics Service using the [Service Restart API][2].

        [1]: /enterprise-analytics/current/analytics-rest-admin/index.html#operation/restart_node
        [2]: /enterprise-analytics/current/analytics-rest-admin/index.html#operation/restart_service
      requestBody:
        description: An object specifying one or more of the configurable node-level parameters on this node.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Node"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/Node"
      security:
        - AnalyticsManage: []
      responses:
        "200":
          $ref: '#/components/responses/OK'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'

components:
 schemas:
  Service:
    type: object
    properties:
      abortTasksTimeout:
        description: The maximum time to wait for tasks to be aborted, in milliseconds.
        type: integer
        format: int32
        x-has-default: true
        default: 600000
      activeMemoryGlobalBudget:
        description: The memory budget for the active runtime. Accepts either an integer number of bytes or a byte string (e.g. `64MiB`).
        oneOf:
          - type: string
          - type: integer
            format: int64
        x-has-default: true
        default: "64 MiB"
      activeStopTimeout:
        description: The maximum time (in seconds) to wait for a graceful stop of an active runtime.
        type: integer
        format: int32
        x-has-default: true
        default: 3600
      activeSuspendTimeout:
        description: The maximum time (in seconds) to wait for a graceful suspend of an active runtime.
        type: integer
        format: int32
        x-has-default: true
        default: 3600
      allowLoopbackRedirectRemoteLink:
        description: Allow remote link redirects to loopback addresses.
        type: boolean
        x-has-default: true
        default: false
      analyticsBroadcastDcpStateMutationCount:
        description: The number of processed mutations after which the DCP state is broadcast to storage.
        type: integer
        format: int64
        x-has-default: true
        default: 100000
      analyticsHttpRequestQueueSize:
        description: The maximum number of HTTP requests to queue pending ability to execute.
        type: integer
        format: int32
        x-has-default: true
        default: 256
      analyticsHttpThreadCount:
        description: The number of threads to service HTTP requests.
        type: integer
        format: int32
        x-has-default: true
        default: 16
      authorizationCacheTtlSeconds:
        description: How long (in seconds) to cache user authorizations before checking with the authorization provider.
        type: integer
        format: int32
        x-has-default: true
        default: 5
      authorizationHaltOnLostCredentialsSeconds:
        description: >
          How long to wait (in seconds) when receiving 401 from the parent process for credentials to succeed before
          halting. (0 == no wait, -1 == wait forever)
        type: integer
        format: int32
        x-has-default: true
        default: 120
      awsAssumeRoleAsyncRefreshEnabled:
        description: >
          Whether the AWS credential provider should fetch credentials asynchronously in the background.
          If `true`, threads are less likely to block when credentials are loaded, but additional resources are used to
          maintain the provider.
        type: boolean
        x-has-default: true
        default: true
      awsAssumeRoleDuration:
        description: AWS assuming role duration in seconds. Range from 900 seconds (15 minutes) to 43200 seconds (12 hours).
        type: integer
        format: int32
        minimum: 900
        maximum: 43200
        x-has-default: true
        default: 3600
      awsAssumeRolePrefetchTime:
        description: >
          The amount of time (in seconds), relative to STS token expiration, at which cached credentials are considered
          close to stale and should be updated. Prefetch updates will occur between the specified time and the stale time
          of the provider.
        type: integer
        format: int32
        x-has-default: true
        default: 300
      awsAssumeRoleStaleTime:
        description: The amount of time (in seconds), relative to STS token expiration, that the cached credentials are considered stale and must be updated.
        type: integer
        format: int32
        x-has-default: true
        default: 60
      azureRequestTimeout:
        description: Timeout (in seconds) for Azure client requests.
        type: integer
        format: int32
        x-has-default: true
        default: 120
      bindAddress:
        description: The specific bind address to use. If not set, the wildcard address is used.
        type: string
        nullable: true
        x-has-default: false
        default: null
      bindToHost:
        description: If `true`, bind to the configured hostname instead of the wildcard address.
        type: boolean
        x-has-default: true
        default: false
      cloudAccessPreemptiveRefreshIntervalSeconds:
        description: >
          The interval (in seconds) at which to attempt to preemptively verify cloud access.
          If access is confirmed to be revoked, the process will halt. (0 == no preemptive refresh)
        type: integer
        format: int32
        x-has-default: true
        default: 30
      cloudAccessRefreshHaltTimeoutSeconds:
        description: The length of time (in seconds) before the process will halt on failure to verify cloud access. (0 == wait forever)
        type: integer
        format: int32
        x-has-default: true
        default: 300
      cloudAccessTtlSeconds:
        description: The length of time (in seconds) allowed to assume we still have write access to cloud resources.
        type: integer
        format: int32
        x-has-default: true
        default: 15
      cloudAcquireTokenTimeout:
        description: >
          The waiting time (in milliseconds) if a requesting thread failed to acquire a token when the rate limit of
          cloud requests is exceeded. (min: 1, max: 5000)
        type: integer
        format: int32
        x-has-default: true
        default: 100
      cloudEvictionPlanReevaluateThreshold:
        description: The number of eviction events after which the eviction plan is re-evaluated.
        type: integer
        format: int32
        x-has-default: true
        default: 50
      cloudMaxReadRequestsPerSecond:
        description: The maximum number of read requests per second (default 1500, 0 means unlimited).
        type: integer
        format: int32
        x-has-default: true
        default: 1500
      cloudMaxWriteRequestsPerSecond:
        description: The maximum number of write requests per second (default 250, 0 means unlimited).
        type: integer
        format: int32
        x-has-default: true
        default: 250
      cloudProfilerLogInterval:
        description: >
          The interval (in minutes) at which to log cloud request statistics. Minimum is 1 minute.
          Note: enabling this logging may perturb the performance of cloud requests. (0 == disabled)
        type: integer
        format: int32
        x-has-default: true
        default: 5
      cloudRequestsHttpConnectionAcquireTimeout:
        description: The waiting time (in seconds) to acquire an HTTP connection before failing the request. (default 120 seconds)
        type: integer
        format: int32
        x-has-default: true
        default: 120
      cloudRequestsHttpConnectionMaxIdleSeconds:
        description: |-
          The time (in seconds) after which an idle cloud connection will be closed. (0 == unlimited idle)

          **Available from Enterprise Analytics 2.1.1.**
        type: integer
        format: int32
        x-has-default: true
        default: 120
      cloudRequestsHttpConnectionMaxLifetimeSeconds:
        description: |-
          The time (in seconds) after which a cloud connection will no longer be reused. (0 == unlimited lifetime)

          **Available from Enterprise Analytics 2.1.1.**
        type: integer
        format: int32
        x-has-default: true
        default: 3600
      cloudRequestsMaxHttpConnections:
        description: The maximum number of HTTP connections to use concurrently for cloud requests per node. (default 1000)
        type: integer
        format: int32
        x-has-default: true
        default: 1000
      cloudRequestsMaxPendingHttpConnections:
        description: The maximum number of HTTP connections allowed to wait for a connection per node. (default 10000)
        type: integer
        format: int32
        x-has-default: true
        default: 10000
      cloudStorageAllocationPercentage:
        description: >
          The percentage of the total disk space that should be allocated for data storage when the `selective` caching
          policy is used. The remaining will act as a buffer for query workspace (i.e., for query operations that require
          spilling to disk). (default 80% of the total disk space)
        type: number
        format: double
        x-has-default: true
        default: 0.8
      cloudStorageCachePolicy:
        description: >
          The caching policy for cloud storage data. Supported values:
          - `selective` — Only cache data that is likely to be reused; sweeps disk when storage thresholds are exceeded.
          - `eager` — Cache all data eagerly.
          - `lazy` — Cache data on first access.
        type: string
        x-has-default: true
        default: selective
      #cloudStorageDebugModeEnabled:
      #  description: Whether or not the debug mode is enabled when using the `selective` caching policy.
      #  type: boolean
      #  x-has-default: true
      #  default: false
      #cloudStorageDebugSweepThresholdSize:
      #  description: >
      #    For debugging only. Overrides `cloudStorageSweepThresholdPercentage` — pressure size will be the current
      #    used space plus the additional bytes provided by this option instead of using the percentage threshold.
      #    Accepts either an integer number of bytes or a byte string (e.g. `1GiB`).
      #  oneOf:
      #    - type: string
      #    - type: integer
      #      format: int64
      #  x-has-default: true
      #  default: "1 GiB"
      cloudStorageDiskMonitorInterval:
        description: >
          The disk monitoring interval time (in seconds) that determines how often the system checks for pressure on disk
          space when using the `selective` caching policy. (default 120 seconds)
        type: integer
        format: int32
        x-has-default: true
        default: 120
      cloudStorageIndexInactiveDurationThreshold:
        description: The duration in minutes to consider an index is inactive. (default 360 or 6 hours)
        type: integer
        format: int32
        x-has-default: true
        default: 360
      cloudStorageS3ClientReadTimeout:
        description: The read timeout (in seconds) for the S3 synchronous client. -1 means the SDK default.
        type: integer
        format: int32
        x-has-default: true
        default: -1
      cloudStorageS3ParallelDownloaderClientType:
        description: >
          The S3 client type used for parallel downloads. Defaults to `crt` when no custom endpoint is
          configured, and `java` otherwise (computed at startup).
        type: string
        x-has-default: false
      cloudStorageS3UseRoundRobinDnsResolver:
        description: Enable round-robin DNS resolver for the S3 client.
        type: boolean
        x-has-default: true
        default: false
      cloudStorageSweepThresholdPercentage:
        description: >
          The percentage of the used storage space at which the disk sweeper starts freeing space by punching holes in
          stored indexes or by evicting them entirely, when the `selective` caching policy is used.
          (default 90% of the allocated space for storage)
        type: number
        format: double
        x-has-default: true
        default: 0.9
      cloudWriteBufferSize:
        description: The write buffer size in bytes. (default 8MB, min 5MB)
        type: integer
        format: int32
        x-has-default: true
        default: 8388608
      clusterConnectRetries:
        description: The number of times to retry connecting to the cluster controller.
        type: integer
        format: int32
        x-has-default: true
        default: 5
      collectDcpStateFromNodesTimeout:
        description: The maximum time (in seconds) to wait to collect DCP state from all nodes.
        type: integer
        format: int32
        x-has-default: true
        default: 600
      compilerArrayindex:
        description: Enable/disable using array-indexes in queries.
        type: boolean
        x-has-default: true
        default: true
      compilerBatchLookup:
        description: Enable/disable batch point-lookups when running queries with secondary indexes.
        type: boolean
        x-has-default: true
        default: true
      compilerCbo:
        description: Set the mode for cost based optimization.
        type: boolean
        x-has-default: true
        default: true
      compilerColumnFilter:
        description: Enable/disable the use of column min/max filters.
        type: boolean
        x-has-default: true
        default: true
      compilerCopyToWriteBufferSize:
        description: The COPY TO write buffer size in bytes. (default 8MB, min 5MB).
        type: integer
        format: int32
        x-has-default: true
        default: 8388608
      compilerDisjunctionAsJoin:
        description: |-
          Rewrite disjunctions to joins in query plans.

          **Available from Enterprise Analytics 2.1.1.**
          The default is `false` for clusters provisioned from 2.1.1 onwards.
          Clusters upgraded to 2.1.1 have this set to `true` to preserve pre-upgrade behavior.
        type: boolean
        x-has-default: true
        default: false
      compilerDisjunctionHashThreshold:
        description: |-
          The number of disjunctions after which a hash-based approach is used for evaluating OR operations. -1 disables the hash-based approach.

          **Available from Enterprise Analytics 2.1.1.**
        type: integer
        format: int32
        x-has-default: true
        default: -1
      compilerExtractCommonExpressionLimit:
        description: |-
          The maximum number of common expressions to extract.

          **Available from Enterprise Analytics 2.1.1.**
          The default is `100` for clusters provisioned from 2.1.1 onwards.
          Clusters upgraded to 2.1.1 have this set to `2147483647` (unlimited) to preserve pre-upgrade behavior.
        type: integer
        format: int32
        x-has-default: true
        default: 100
      compilerExternalFieldPushdown:
        description: Enable pushdown of field accesses to the external data-scan operator.
        type: boolean
        x-has-default: true
        default: true
      compilerExternalscanmemory:
        description: The memory budget for an external scan operator instance in a partition. Accepts either an integer number of bytes or a byte string (e.g. `8KiB`, `1MiB`).
        oneOf:
          - type: string
          - type: integer
            format: int32
        x-has-default: true
        default: "8 KiB"
      compilerFramesize:
        description: The page size for computation. Accepts either an integer number of bytes or a byte string (e.g. `32KiB`).
        oneOf:
          - type: string
          - type: integer
            format: int32
        x-has-default: true
        default: "32 KiB"
      compilerGroupmemory:
        description: The memory budget for a group by operator instance in a partition. Accepts either an integer number of bytes or a byte string (e.g. `32MiB`).
        oneOf:
          - type: string
          - type: integer
            format: int64
        x-has-default: true
        default: "32 MiB"
      compilerJoinmemory:
        description: The memory budget for a join operator instance in a partition. Accepts either an integer number of bytes or a byte string (e.g. `32MiB`).
        oneOf:
          - type: string
          - type: integer
            format: int64
        x-has-default: true
        default: "32 MiB"
      compilerMaxVariableOccurrencesInlining:
        description: Maximum occurrences of a variable allowed in an expression for inlining.
        type: integer
        format: int32
        x-has-default: true
        default: 128
      compilerMinGroupmemory:
        description: The minimum memory budget for a group by operator instance in a partition. Accepts either an integer number of bytes or a byte string (e.g. `512KiB`, `32MiB`).
        oneOf:
          - type: string
          - type: integer
            format: int64
        x-has-default: true
        default: "512 KiB"
      compilerMinJoinmemory:
        description: The minimum memory budget for a join operator instance in a partition. Accepts either an integer number of bytes or a byte string (e.g. `512KiB`, `32MiB`).
        oneOf:
          - type: string
          - type: integer
            format: int64
        x-has-default: true
        default: "512 KiB"
      compilerMinSortmemory:
        description: The minimum memory budget for a sort operator instance in a partition. Accepts either an integer number of bytes or a byte string (e.g. `512KiB`, `32MiB`).
        oneOf:
          - type: string
          - type: integer
            format: int64
        x-has-default: true
        default: "512 KiB"
      compilerMinWindowmemory:
        description: The minimum memory budget for a window operator instance in a partition. Accepts either an integer number of bytes or a byte string (e.g. `512KiB`, `32MiB`).
        oneOf:
          - type: string
          - type: integer
            format: int64
        x-has-default: true
        default: "512 KiB"
      compilerOptimizeExpressionMaxArgs:
        description: |-
          Avoid costly O(N^2) expression optimization passes (e.g. constant folding, CSE) on large IN-list queries
          when the number of OR/AND function arguments is greater than or equal to the specified value.

          **Available from Enterprise Analytics 2.1.1.**
          The default is `200` for clusters provisioned from 2.1.1 onwards.
          Clusters upgraded to 2.1.1 have this set to `2147483647` (unlimited) to preserve pre-upgrade behavior.
        type: integer
        format: int32
        x-has-default: true
        default: 200
      compilerOrderedFields:
        description: Enable/disable select order list.
        type: boolean
        x-has-default: true
        default: false
      compilerParallelism:
        description: >
          The degree of parallelism for query execution.
          Zero means to use the storage parallelism as the query execution parallelism, while other integer values
          dictate the number of query execution parallel partitions. The system will fall back to use the number of
          all available CPU cores in the cluster as the degree of parallelism if the number set by a user is too
          large or too small.
        type: integer
        format: int32
        x-has-default: true
        default: 0
      compilerQueryplanshape:
        description: Set the mode for forcing the shape of the query plan (e.g., `zigzag`, `leftdeep`, `rightdeep`).
        type: string
        x-has-default: true
        default: zigzag
      compilerRuntimeMemoryOverhead:
        description: A percentage of the job's required memory to be added to account for runtime memory overhead.
        type: integer
        format: int32
        x-has-default: true
        default: 5
      compilerSortmemory:
        description: The memory budget for a sort operator instance in a partition. Accepts either an integer number of bytes or a byte string (e.g. `32MiB`).
        oneOf:
          - type: string
          - type: integer
            format: int64
        x-has-default: true
        default: "32 MiB"
      compilerSortParallel:
        description: Enables/disables full parallel sort.
        type: boolean
        x-has-default: true
        default: false
      compilerWindowmemory:
        description: The memory budget for a window operator instance in a partition. Accepts either an integer number of bytes or a byte string (e.g. `32MiB`).
        oneOf:
          - type: string
          - type: integer
            format: int64
        x-has-default: true
        default: "32 MiB"
      copyToKvBucketWaitUntilReadyTimeout:
        description: The number of seconds to wait for COPY TO KV bucket WaitUntilReady before timing out.
        type: integer
        format: int32
        x-has-default: true
        default: 30
      coresMultiplier:
        description: The factor to multiply by the number of cores to determine maximum query concurrent execution level.
        type: integer
        format: int32
        x-has-default: true
        default: 3
      dcpBufferAckWatermark:
        description: The integer percentage of DCP connection buffer size at which to acknowledge bytes consumed to the DCP producer as part of flow control.
        type: integer
        format: int32
        x-has-default: true
        default: 20
      dcpChannelConnectAttemptTimeout:
        description: The maximum attempt time to connect to a DCP channel in seconds.
        type: integer
        format: int32
        x-has-default: true
        default: 120
      dcpChannelConnectTotalTimeout:
        description: The maximum time to wait to connect to a DCP channel in seconds.
        type: integer
        format: int32
        x-has-default: true
        default: 480
      dcpConnectionBufferSize:
        description: |-
          DCP connection buffer size in bytes.

          **Default:** Computed at startup — 10 MiB divided by the number of IO devices on the node when the JVM
          maximum heap is less than 8 GiB; otherwise 1% of the JVM maximum heap divided by the number of IO devices.
          A plain integer value in bytes may be specified to override this.
        type: integer
        format: int32
        x-has-default: false
      dcpForceSnappyCompression:
        description: >
          Directs KV to snappy compress all values before sending to Analytics.
          This should only be enabled in specific circumstances, as it will increase memory and CPU use on data nodes.
          Only applicable if snappy compression support is enabled (`dcpSupportSnappyCompression`).
        type: boolean
        x-has-default: true
        default: false
      dcpIdleQueueFlushThresholdMillis:
        description: The number of milliseconds before an empty DCP queue will trigger a flush of any pending incoming mutations to storage. (0 == flush instantly, negative value == never flush)
        type: integer
        format: int64
        x-has-default: true
        default: 100
      dcpMaxConnectionsPerKvNode:
        description: The maximum number of DCP connections to allow to each KV node for an ingestion (cluster-wide).
        type: integer
        format: int32
        x-has-default: true
        default: 128
      dcpMinWorkPerKvConnection:
        description: >
          The minimum amount of work to allow per DCP connection for each ingestion connection. Work is
          (vbuckets * streams), where one stream is used for each unique KV collection being ingested.
          When allocating connections, it will be attempted to keep work per connection above this number.
        type: integer
        format: int32
        x-has-default: true
        default: 8
      dcpNoopInterval:
        description: The DCP NOOP interval (in seconds) used for dead connection detection.
        type: integer
        format: int32
        x-has-default: true
        default: 120
      dcpStreamRequestIncludePurgeSeqnos:
        description: Whether the DCP client should include the purge sequence number in stream requests, if supported by the producer.
        type: boolean
        x-has-default: true
        default: true
      dcpSupportSnappyCompression:
        description: Support receiving values from KV via DCP in snappy compressed form.
        type: boolean
        x-has-default: true
        default: true
      dcpTargetMaxWorkPerKvConnection:
        description: >
          The maximum amount of work to target per DCP connection for each ingestion connection. Work is
          (vbuckets * streams), where one stream is used for each unique KV collection being ingested.
          The larger this number, the fewer DCP connections that will be attempted to be used.
        type: integer
        format: int32
        x-has-default: true
        default: 64
      deadlockWatchdogHaltDelaySeconds:
        description: The delay (in seconds) to wait for graceful shutdown due to deadlocked threads, before halting.
        type: integer
        format: int64
        x-has-default: true
        default: 120
      deadlockWatchdogPollSeconds:
        description: The frequency (in seconds) to scan for deadlocked threads.
        type: integer
        format: int64
        x-has-default: true
        default: 300
      gcpImpersonateServiceAccountDuration:
        description: GCS impersonating service account duration in seconds. Range from 60 seconds (1 minute) to 3600 seconds (1 hour).
        type: integer
        format: int32
        minimum: 60
        maximum: 3600
        x-has-default: true
        default: 900
      healthCheckStatusCodeEjecting:
        description: >
          HTTP status code returned by the health check endpoint (GET :8095/api/v1/health) when the node is being
          rebalanced out of the cluster. This should indicate failure to upstream load balancers so that traffic is no
          longer routed to the node.
        type: integer
        format: int32
        x-has-default: true
        default: 503
      healthCheckStatusCodeNormal:
        description: >
          HTTP status code returned by the health check endpoint (GET :8095/api/v1/health) when the node is healthy
          and able to serve traffic. This should indicate success to upstream load balancers.
        type: integer
        format: int32
        x-has-default: true
        default: 204
      ingestionMaxBootstrapIntervalSeconds:
        description: >
          The timeout (in seconds) to wait for remaining partitions to complete bootstrapping after at least one has
          bootstrapped, before aborting ingestion and triggering a reconnect.
        type: integer
        format: int32
        x-has-default: true
        default: 480
      jobHistorySize:
        description: The number of historical jobs to retain in memory.
        type: integer
        format: int32
        x-has-default: true
        default: 10
      jobQueueCapacity:
        description: The maximum number of jobs to queue before rejecting new jobs.
        type: integer
        format: int32
        x-has-default: true
        default: 4096
      jsonMaxDepth:
        description: The maximum nesting depth for JSON objects. The depth is a count of objects and arrays that have not been closed, `{` and `[` respectively.
        type: integer
        format: int32
        x-has-default: true
        default: 1000
      jsonMaxDocLength:
