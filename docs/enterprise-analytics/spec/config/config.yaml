        oneOf:
          - type: string
          - type: integer
            format: int64
        x-has-default: true
        default: 0
      jsonMaxNameLength:
        description: The maximum length of a JSON field name. Accepts either an integer number of bytes or a byte string.
        oneOf:
          - type: string
          - type: integer
            format: int32
        x-has-default: true
        default: 50000
      jsonMaxNumberLength:
        description: The maximum length of a JSON number. Accepts either an integer number of bytes or a byte string. 0 or less means no limit.
        oneOf:
          - type: string
          - type: integer
            format: int32
        x-has-default: true
        default: 1000
      jsonMaxStringLength:
        description: The maximum length of a JSON string value. Accepts either an integer number of bytes or a byte string. 0 or less means no limit.
        oneOf:
          - type: string
          - type: integer
            format: int32
        x-has-default: true
        default: "40 MiB"
      jsonMaxTokenCount:
        description: >
          The maximum number of JSON tokens in a JSON object (0 or less is no limit). A token is a single unit of input,
          such as a number, a string, an object start or end, or an array start or end.
        type: integer
        format: int64
        x-has-default: true
        default: 0
      jvmArgs:
        description: |-
          JVM arguments to pass to the Analytics Driver.
          The default is undefined (null).

          Note that JVM arguments are generally not secure, and are exposed by [cbcollect_info][1] and the [System Event][2] log.
          To pass arguments opaquely, you may use [Java command-line argument files][3].

          [1]: /enterprise-analytics/current/cli/cbcollect-info-tool.html
          [2]: /server/7.6/learn/clusters-and-availability/system-events.html
          [3]: https://docs.oracle.com/en/java/javase/11/tools/java.html#GUID-4856361B-8BFD-4964-AE84-121F5F6CF111
        type: string
        nullable: true
        x-has-default: false
        default: null
      kafkaMaxFetchBytes:
        description: Maximum number of bytes fetched by a Kafka consumer in one request.
        type: integer
        format: int32
        x-has-default: true
        default: 4194304
      maxActiveLinks:
        description: The maximum number of links that can be active at any given time.
        type: integer
        format: int32
        x-has-default: true
        default: 100
      maxRedirectsLocal:
        description: The number of redirects to follow when communicating with the local cluster via HTTP(S).
        type: integer
        format: int32
        x-has-default: true
        default: 0
      maxRedirectsRemoteLink:
        description: The number of redirects to follow when communicating with a remote link cluster via http for remote links not configured to prevent redirects.
        type: integer
        format: int32
        x-has-default: true
        default: 10
      maxWebRequestSize:
        description: The maximum accepted web request size in bytes.
        type: integer
        format: int64
        x-has-default: true
        default: 209715200
      metadataRegistrationTimeoutSecs:
        description: How long (in seconds) to wait for the metadata node to register with the cluster controller.
        type: integer
        format: int32
        x-has-default: true
        default: 1800
      netBufferCount:
        description: The number of network buffers per thread.
        type: integer
        format: int32
        x-has-default: true
        default: 1
      netThreadCount:
        description: The number of network I/O threads.
        type: integer
        format: int32
        x-has-default: true
        default: 1
      nodeDeltaRecovery:
        description: Attempt to perform delta recovery when a node is recovered after a failover.
        type: boolean
        x-has-default: true
        default: true
      rebalanceEjectDelaySeconds:
        description: The delay (in seconds) before a node is ejected from the cluster during rebalance from the time that the health check API on that node will start reporting an error response. This is to allow adequate time for the node to removed from consideration by clients utilizing the health check API, to avoid failures on rebalance out; 0 == means no delay.
        type: integer
        format: int32
        x-has-default: true
        default: 0
      # unused in EA as we don't rebalance datasets, we reassign storage partitions
      #rebalancePullDatasetSizeFrequency:
