      #  type: integer
      #  format: int32
      #  x-has-default: true
      #  default: 5
      remoteLinkConnectTimeoutSeconds:
        description: >
          The maximum time (in seconds) to wait for a remote link connection to establish.
          A value of 0 disables timeout; a value of -1 sets timeout to the system default.
        type: integer
        format: int32
        x-has-default: true
        default: 30
      remoteLinkRefreshAuthSeconds:
        description: The frequency at which permissions should be reevaluated for remote buckets/collections that may have been lost/restored for remote cluster versions at 7.0 or later; a value of 0 disables preemptive reevaluation.
        type: integer
        format: int32
        x-has-default: true
        default: 0
      remoteLinkSocketTimeoutSeconds:
        description: >
          The maximum time (in seconds) to wait after establishing the connection for remote links;
          the maximum time of inactivity between two data packets.
          A value of 0 disables timeout; a value of -1 sets timeout to the system default.
        type: integer
        format: int32
        x-has-default: true
        default: 60
      remoteLinkValidationMaxRetries:
        description: The number of times to retry on a remote link credential / config validation connection failure, i.e. on CREATE or ALTER LINK (0 == don't retry).
        type: integer
        format: int32
        x-has-default: true
        default: 0
      remoteStorageSizeMetricTtlMillis:
        description: The length of time after which the remote storage size metric is recomputed.
        type: integer
        format: int64
        x-has-default: true
        default: 300000
      replicaInactivityTimeoutSeconds:
        description: The number of seconds to wait before declaring a replica inactive while it is catching up.
        type: integer
        format: int32
        x-has-default: true
        default: 900
      replicaRecoveryWaitIntervalSeconds:
        description: The number of seconds to wait for a failed replica to recover before suspending new writes.
        type: integer
        format: int32
        x-has-default: true
        default: 720
      replicaReportIntervalSeconds:
        description: The number of seconds to wait before sending a replicas report.
        type: integer
        format: int32
        x-has-default: true
        default: 5
      #replicationTimeout:
      #  description: The timeout (in seconds) for replication operations.
      #  type: integer
      #  format: int64
      #  x-has-default: true
      #  default: 30
      requestsArchiveSize:
        description: The maximum number of archived requests to maintain.
        type: integer
        format: int32
        x-has-default: true
        default: 1000
      # async api is unsupported in 2.1
      #resultSweepThreshold:
      #  description: The duration (in milliseconds) after which the system will sweep for expired async query results.
      #  type: integer
      #  format: int64
      #  x-has-default: true
      #  default: 60000
      # async api is unsupported in 2.1
      #resultTtl:
      #  description: Limits the amount of time results for asynchronous jobs should be retained by the system in milliseconds.
      #  type: integer
      #  format: int64
      #  x-has-default: true
      #  default: 86400000
      serializationReplacementsLogFrequency:
        description: The frequency (in seconds) at which to debug-log serialization replacements.
        type: integer
        format: int64
        x-has-default: true
        default: 1800
      storageBuffercacheMaxopenfiles:
        description: The maximum number of open files in the buffer cache.
        type: integer
        format: int32
        x-has-default: true
        default: 2147483647
      storageBuffercachePagesize:
        description: The page size for pages in the buffer cache. Accepts either an integer number of bytes or a byte string (e.g. `128KiB`).
        oneOf:
          - type: string
          - type: integer
            format: int32
        x-has-default: true
        default: "128 KiB"
      storageColumnBufferAcquireTimeout:
        description: The maximum time in milliseconds to wait for acquiring a buffer from the column buffer pool.
        type: integer
        format: int64
        x-has-default: true
        default: 120000
      storageColumnBufferPoolMaxMemory:
        description: >
          The maximum memory allocated to the column buffer pool.
          Accepts either an integer number of bytes or a byte string (e.g. `512MiB`).


          **Default:** 3% of the JVM maximum heap size, or 100 MiB for JVM heaps below ~3.3 GiB (computed at startup).
          A value of `0` restores the computed default.
        oneOf:
          - type: string
          - type: integer
            format: int64
        x-has-default: false
      storageColumnBufferPoolMaxSize:
        description: The maximum number of buffers in the column buffer pool.
        type: integer
        format: int32
        x-has-default: true
        default: 8000
      storageColumnBufferSize:
        description: The size of each buffer in the column buffer pool. Accepts either an integer number of bytes or a byte string (e.g. `4KiB`).
        oneOf:
          - type: string
          - type: integer
            format: int32
        x-has-default: true
        default: "4 KiB"
      storageCompressionBlock:
        description: The default block compression scheme for storage (e.g., `snappy`, `none`).
        type: string
        x-has-default: true
        default: snappy
      storageDiskForceBytes:
        description: The number of bytes written before each disk force (fsync). Accepts either an integer number of bytes or a byte string (e.g. `16MiB`).
        oneOf:
          - type: string
          - type: integer
            format: int64
        x-has-default: true
        default: "16 MiB"
      storageFormat:
        description: The default storage format (either `row` or `column`).
        type: string
        x-has-default: true
        default: column
      storageIoScheduler:
        description: The I/O scheduler for LSM flush and merge operations (e.g., `greedy`, `async`).
        type: string
        x-has-default: true
        default: async
      storageMaxColumnsInZerothSegment:
        description: The maximum number of columns in the zero segment (page-zero). Accepts either an integer or a byte string.
        oneOf:
          - type: string
          - type: integer
            format: int32
        x-has-default: true
        default: 5000
      storageMaxConcurrentFlushesPerPartition:
        description: The maximum number of concurrently executed flushes per partition (0 means unlimited).
        type: integer
        format: int32
        x-has-default: true
        default: 1
      storageMaxConcurrentMergesPerPartition:
        description: The maximum number of concurrently executed merges per partition (0 means unlimited).
        type: integer
        format: int32
        x-has-default: true
        default: 1
      storageMaxScheduledMergesPerPartition:
        description: The maximum number of scheduled merges per partition (0 means unlimited).
        type: integer
        format: int32
        x-has-default: true
        default: 8
      storageMemorycomponentFlushThreshold:
        description: The memory usage threshold (as a fraction) at which memory components should be flushed.
        type: number
        format: double
        x-has-default: true
        default: 0.9
      storageMemorycomponentMaxScheduledFlushes:
        description: The maximum number of scheduled flush operations. 0 means that the value will be calculated as the number of partitions.
        type: integer
        format: int32
        x-has-default: true
        default: 0
      storageMemorycomponentNumcomponents:
        description: The number of memory components to be used per LSM index.
        type: integer
        format: int32
        x-has-default: true
        default: 2
      storageMemorycomponentPagesize:
        description: The page size for pages allocated to memory components. Accepts either an integer number of bytes or a byte string (e.g. `128KiB`).
        oneOf:
          - type: string
          - type: integer
            format: int32
        x-has-default: true
        default: "128 KiB"
      storagePageZeroWriter:
        description: "The implementation to use for writing page-zero in storage components. Possible values: `default`, `sparse`, `adaptive`."
        type: string
        x-has-default: true
        default: default
      storageWriteRateLimit:
        description: The maximum disk write rate for each storage partition. 0 or less disables the limit. Accepts either an integer number of bytes per second or a byte string (e.g. `100MiB`).
        oneOf:
          - type: string
          - type: integer
            format: int64
        x-has-default: true
        default: 0
      streamingSocketTimeoutSeconds:
        description: >
          The maximum time (in seconds) to wait for a response for streaming requests; the maximum time of inactivity
          between two data packets. A value of 0 disables timeout; a value of -1 sets timeout to the system default.
        type: integer
        format: int32
        x-has-default: true
        default: 0
      threaddumpFrequencySeconds:
        description: The frequency (in seconds) at which to log diagnostic thread dumps.
        type: integer
        format: int64
        x-has-default: true
        default: 300
      threaddumpLogLevel:
        description: The log level at which to emit diagnostic thread dumps (e.g., `DEBUG`, `INFO`, `WARN`).
        type: string
        x-has-default: true
        default: DEBUG
      traceCategories:
        description: |-
          A comma-separated list of trace categories to enable for diagnostic tracing.
          The default is undefined (null — no categories enabled).
        type: string
        nullable: true
        x-has-default: false
        default: null
      txnDatasetCheckpointInterval:
        description: The interval (in seconds) after which an Analytics collection is considered idle and persisted to disk.
        type: integer
        format: int32
        x-has-default: true
        default: 3600


  Node:
    type: object
    properties:
      jvmArgs:
        description: |-
          JVM arguments to pass to the Analytics Driver.
          The default is undefined (null).

          Node-specific JVM arguments are appended to service-level JVM arguments.
          If the same JVM argument appears in both the service-level arguments and the node-specific arguments, the node-specific argument takes priority.

          Note that JVM arguments are generally not secure, and are exposed by [cbcollect_info] and the [System Event] log.
          To pass arguments opaquely, you may use [Java command-line argument files][1].

          [1]: https://docs.oracle.com/en/java/javase/11/tools/java.html#GUID-4856361B-8BFD-4964-AE84-121F5F6CF111
        type: string
        nullable: true
        x-has-default: false
        default: null
      storageBuffercacheSize:
        description: |-
          The size of memory allocated to the disk buffer cache.
          The value should be a multiple of the buffer cache page size.
          Accepts either an integer number of bytes or a byte string (e.g. `512MiB`, `2GiB`).

          **Default:** 1/4 of the JVM maximum heap size (computed at startup).
        oneOf:
          - type: string
          - type: integer
            format: int64
        x-has-default: false
      storageMemorycomponentGlobalbudget:
        description: |-
          The size of memory allocated to the memory components.
          The value should be a multiple of the memory component page size.
          Accepts either an integer number of bytes or a byte string (e.g. `512MiB`, `2GiB`).

          **Default:** 1/4 of the JVM maximum heap size (computed at startup).
        oneOf:
          - type: string
          - type: integer
            format: int64
        x-has-default: false
      # these were in the NC section in error, so we hide them from here since they are actually global settings
      #storagePageZeroWriter:
      #  description: "The implementation to use for writing page-zero in storage components on this node. Possible values: `default`, `sparse`, `adaptive`."
      #  type: string
      #  x-has-default: true
      #  default: default
      #storageMaxColumnsInZerothSegment:
      #  description: The maximum number of columns in the zero segment (page-zero) on this node. Accepts either an integer or a byte string.
      #  oneOf:
      #    - type: string
      #    - type: integer
      #      format: int32
      #  x-has-default: true
      #  default: 5000

  Errors:
    type: object
    required:
      - error
    properties:
      error:
        type: string
        description: An error message.

 responses:
  OK:
    description: The operation was successful.

  BadRequest:
    description: >
      Bad request.
      Unknown parameter or incorrect value.
    content:
      application/json:
        schema:
          $ref: "#/components/schemas/Errors"

  Unauthorized:
    description: |-
      Unauthorized.
      The user name or password may be incorrect.

      Returns an object containing an error message.
      Refer to [Error Codes](/server/7.6/analytics/error-codes.html).
    content:
      application/json:
        schema:
          type: object

 securitySchemes:
  AnalyticsManage:
    type: http
    scheme: basic
    description: |-
      Users must have one of the following RBAC roles:

      * Full Admin
      * Cluster Admin
      * Enterprise Analytics Admin